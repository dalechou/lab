<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Line Picker</title>
    <link rel='stylesheet' href='../styles.css'>
</head>
<body>
    <h1>Random Line Picker</h1>
    <p id="randomLine">Loading...</p>
    <button onclick="fetchRandomLine()">Get Random Line</button>

    <script>
        function fetchRandomLine() {
            fetch('lines.txt')
                .then(response => response.text())
                .then(data => {
                    const lines = data.split('\n');
                    const randomIndex = Math.floor(Math.random() * lines.length);
                    document.getElementById('randomLine').innerText = lines[randomIndex];
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('randomLine').innerText = 'Error loading file.';
                });
        }

        // Automatically fetch a random line on page load
        window.onload = fetchRandomLine;
    </script>
</body>
</html>
