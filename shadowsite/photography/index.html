<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Dale Chou's photography</title>
    <link rel='stylesheet' href='../styles.css'>
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
</head>
<body>
<header>
<nav>
    <div id='mainnav'></div>
    <script>
    $(function(){
        $('#mainnav').load('nav.html');
    });
    </script>
    <br>
</nav>
</header>
<section class='portfolio-grid'>
    
    <article class='portfolio-item'>
        <img src='./images/R0000642.jpg' alt='Jelly beings'>
        <p>Ricoh GR 18 mm<br><i>f</i>/2.8, 1/60 s, ISO 800</p>
    </article>

    <article class='portfolio-item'>
        <img src='./images/R0011651-a.jpg' alt='Person looking up with a leashed dog looking the other way'>
        <p>Ricoh GR 18 mm<br><i>f</i>/2.8, 1/500 s, ISO 100</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/R0000642.jpg' alt='Jelly beings'>
        <p>Ricoh GR 18 mm<br><i>f</i>/2.8, 1/60 s, ISO 800</p>
    </article>

    <article class='portfolio-item'>
        <img src='./images/R0011651-a.jpg' alt='Person looking up with a leashed dog looking the other way'>
        <p>Ricoh GR 18 mm<br><i>f</i>/2.8, 1/500 s, ISO 100</p>
    </article>    

</section>
<div id='lightbox' class='lightbox'>
    <div class='lightbox-content'>
        <button class='lightbox-close'>&times;</button>
        <img id='lightbox-img' src='' alt=''>
    </div>
</div>
<script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.querySelector('.lightbox-close');
    const portfolioImages = document.querySelectorAll('.portfolio-item img');

    portfolioImages.forEach(img => {
        img.addEventListener('click', function() {
            lightboxImg.src = this.src;
            lightboxImg.alt = this.alt;
            lightbox.classList.add('active');
        });
    });

    lightboxClose.addEventListener('click', function() {
        lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            lightbox.classList.remove('active');
        }
    });
</script>
<footer>
<nav>
    <br><br><br><br><br><br><br><br><br><br><br><br>
    <a href='#'><span class='material-symbols-rounded'>vertical_align_top</span></a>
</nav>
</footer>
</body>
</html>
